<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Freightvera</title>
  <meta name="description" content="Truth and trust in freight. Instantly assess carrier risk, safety, and credibility before booking a load.">
  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      max-width: 800px;
      text-align: center;
      padding: 40px 24px;
    }
    h1 {
      font-size: 56px;
      margin: 0 0 12px;
    }
    h2 {
      font-size: 24px;
      font-weight: 400;
      color: #cbd5e1;
      margin: 0 0 24px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #e2e8f0;
      margin: 0 auto 32px;
      max-width: 680px;
    }
    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: #1e293b;
      color: #fff;
      border: 1px solid #334155;
    }
    .note {
      margin-top: 28px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="freightvera-logo.png" style="max-width:360px;margin-bottom:20px;">
    <h2>Truth &amp; Trust in Freight</h2>
    <p>
      Instantly assess carrier risk, safety, and credibility before booking a load.
      Freightvera is being built to help brokers, shippers, and logistics teams make smarter decisions.
    </p>

    <div class="buttons">
      <a href="#" class="btn btn-primary">Search Carrier (Coming Soon)</a>
      <a href="mailto:you@example.com" class="btn btn-secondary">Join Early Access</a>
    </div>

    <div class="note">
      Early access now forming.
    </div>
  </div>
</body>
</html>
